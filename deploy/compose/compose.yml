name: election

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  frontend_net:
  backend_net:
    internal: true
  admin_net:

# ---------------------------------------------------------------------------
# Secrets  (files must exist before first `docker compose up`)
# ---------------------------------------------------------------------------
secrets:
  ADMIN_PASSWORD:
    file: ./secrets/admin_pw.txt
  COMMITTEE_PASSWORD:
    file: ./secrets/committee_pw.txt
  SESSION_SECRET:
    file: ./secrets/session_secret.txt

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── Voter Frontend ────────────────────────────────────────────────────────
  frontend:
    image: election-frontend:latest
    pull_policy: never
    container_name: frontend
    restart: unless-stopped
    expose:
      - '8080'
    networks:
      - backend_net
      - frontend_net
    depends_on:
      - backend
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8080']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Admin Frontend ────────────────────────────────────────────────────────
  admin_frontend:
    image: election-admin-frontend:latest
    pull_policy: never
    container_name: admin_frontend
    restart: unless-stopped
    expose:
      - '8081'
    networks:
      - backend_net
      - admin_net
    depends_on:
      - backend
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8081']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    image: election-backend:latest
    pull_policy: never
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend.env
    expose:
      - '3000'
    secrets:
      - ADMIN_PASSWORD
      - COMMITTEE_PASSWORD
      - SESSION_SECRET
    depends_on:
      - postgres
      - redis
    networks:
      - backend_net
    volumes:
      - ./secrets/keys:/run/secrets/keys:ro
      - ./election_presets.json:/app/data/election_presets.json:ro
      - backend_uploads:/app/uploads

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ./postgres.env
    networks:
      - backend_net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    networks:
      - backend_net
    volumes:
      - redis_data:/data

  # ── WAF (Voter Frontend) ──────────────────────────────────────────────────
  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: waf
    restart: unless-stopped
    networks:
      - frontend_net
    ports:
      - '80:8080'
      - '443:8443'
    volumes:
      - ./certs/voter:/etc/nginx/certs:ro
      - waf_logs:/var/log/modsecurity/host
      - ./waf/conf.d/global_tuning.conf:/etc/nginx/conf.d/global_tuning.conf:ro
      - ./waf/conf.d/security_logic.conf:/etc/nginx/conf.d/z_rate_limit_apply.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      - MODSEC_AUDIT_ENGINE=on
      - MODSEC_AUDIT_LOG=/var/log/modsecurity/host/audit.log
      - LOGLEVEL=warn
      - ERRORLOG=/var/log/modsecurity/host/error.log
      - SSL_OCSP_STAPLING=off
      - MAX_FILE_SIZE=5000000
      - ALLOWED_METHODS=GET POST PUT DELETE
      - SERVER_NAME=${SERVER_NAME:-localhost}
      - BACKEND=http://frontend:8080
      - PORT=8080
      - SSL_PORT=8443
      - SSL_CERT_FILE=/etc/nginx/certs/server.crt
      - SSL_CERT_KEY_FILE=/etc/nginx/certs/server.key
      - SSL_PROTOCOLS=TLSv1.2 TLSv1.3
      - SECURITY_ENGINE=On
      - PARANOIA=2
      - ANOMALY_INBOUND_THRESHOLD=5
      - ANOMALY_OUTBOUND_THRESHOLD=4
      - WORKER_CONNECTIONS=1024
      - CLIENT_MAX_BODY_SIZE=10M

  # ── WAF (Admin Frontend) ──────────────────────────────────────────────────
  waf_admin:
    image: owasp/modsecurity-crs:nginx
    container_name: waf_admin
    restart: unless-stopped
    networks:
      - admin_net
    ports:
      - '8444:8443'
    volumes:
      - ./certs/admin:/etc/nginx/certs:ro
      - waf_admin_logs:/var/log/modsecurity/host
      - ./waf_admin/conf.d/global_tuning.conf:/etc/nginx/conf.d/global_tuning.conf:ro
      - ./waf_admin/conf.d/security_logic.conf:/etc/nginx/conf.d/z_rate_limit_apply.conf:ro
    depends_on:
      admin_frontend:
        condition: service_healthy
    environment:
      - MODSEC_AUDIT_ENGINE=on
      - MODSEC_AUDIT_LOG=/var/log/modsecurity/host/audit.log
      - LOGLEVEL=warn
      - ERRORLOG=/var/log/modsecurity/host/error.log
      - SSL_OCSP_STAPLING=off
      - MAX_FILE_SIZE=536870912
      - ALLOWED_METHODS=GET POST PUT DELETE
      - SERVER_NAME=${SERVER_NAME:-localhost}
      - BACKEND=http://admin_frontend:8081
      - PORT=8080
      - SSL_PORT=8443
      - SSL_CERT_FILE=/etc/nginx/certs/server.crt
      - SSL_CERT_KEY_FILE=/etc/nginx/certs/server.key
      - SSL_PROTOCOLS=TLSv1.2 TLSv1.3
      - SECURITY_ENGINE=On
      - PARANOIA=2
      - ANOMALY_INBOUND_THRESHOLD=5
      - ANOMALY_OUTBOUND_THRESHOLD=4
      - WORKER_CONNECTIONS=1024
      - CLIENT_MAX_BODY_SIZE=512M

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  waf_logs:
  waf_admin_logs:
