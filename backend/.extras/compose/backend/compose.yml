secrets:
  ADMIN_PASSWORD:
    file: ./secrets/admin_pw.txt
  COMMITTEE_PASSWORD:
    file: ./secrets/committee_pw.txt
  SESSION_SECRET:
    file: ./secrets/session_secret.txt

services:
  backend:
    container_name: backend
    image: backend:latest
    pull_policy: never
    env_file:
      - .env
    expose:
      - 3000
    #ports:
    #  - '3000:3000'
    secrets:
      - ADMIN_PASSWORD
      - COMMITTEE_PASSWORD
      - SESSION_SECRET
    depends_on:
      - postgres
    networks:
      - backend_net
    volumes:
      - ./secrets/keys:/run/secrets/keys:ro
      - ./data/election_presets.json:/app/data/election_presets.json:ro
