services:
  admin_frontend:
    image: admin-frontend:latest
    pull_policy: never
    container_name: admin_frontend
    expose:
      - '8081'
    networks:
      - backend_net
      - admin_net
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    depends_on:
      - backend
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8081']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
