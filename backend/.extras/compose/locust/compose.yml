services:
  # Frontend mit deaktiviertem Rate-Limit für Lasttests
  frontend-loadtest:
    image: frontend:latest
    pull_policy: never
    container_name: frontend-loadtest
    volumes:
      - ../../../frontend/nginx.loadtest.conf:/etc/nginx/nginx.conf:ro
    expose:
      - '8080'
    ports:
      - '8081:8080'
    networks:
      - backend_net
      - frontend_net

  locust:
    image: locustio/locust
    profiles: ['dev', 'prod']
    volumes:
      - ./:/mnt/locust
    # WAF-Test (Standard):   LOCUST_FILE=locustfile.py
    # Wähler-Lasttest:        LOCUST_FILE=locustfile_voting.py
    # Host über WAF (HTTPS) damit Secure-Cookies korrekt übertragen werden
    command: -f /mnt/locust/${LOCUST_FILE:-locustfile_voting.py} --host https://localhost:443
    networks:
      - frontend_net
    ports:
      - '8089:8089'
